<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Camerons Behaviour</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#7cc7ff" />
</head>

<body>
  <main class="app">
    <section class="top-card">
      <div class="emoji-row">⭐ 🌈 🚦 🌈 ⭐</div>
      <h1>Camerons Behaviour</h1>
      <p class="subtitle">Choose Cameron's colour for today</p>
      <p class="save-status">Saved on this phone only</p>
    </section>

    <section class="traffic-light-card">
      <section class="traffic-light" aria-label="Behaviour traffic light">
        <button class="light red" id="redLight" aria-label="Red: tricky choices">
          <span>😟</span>
        </button>

        <button class="light amber" id="amberLight" aria-label="Amber: okay day">
          <span>😐</span>
        </button>

        <button class="light green" id="greenLight" aria-label="Green: great choices">
          <span>😄</span>
        </button>
      </section>

      <div class="colour-labels">
        <div><strong>Red</strong><br />Tricky choices</div>
        <div><strong>Amber</strong><br />Okay day</div>
        <div><strong>Green</strong><br />Great choices</div>
      </div>
    </section>

    <section class="today-card">
      <div class="today-title">Today</div>
      <div class="message" id="message">Tap a colour for today</div>
      <div class="sub-message" id="subMessage"></div>

      <button class="reset-button" id="resetButton">Reset Today</button>
    </section>

    <section class="history">
      <h2>Day History</h2>
      <div id="historyList"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
